name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'example/**'
      - '.github/workflows/release.yml'
      - 'README-NuGet.md'

permissions:
  contents: read

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false

    # The NuGet package we're building supports .NET 8, .NET 9, and .NET 10.
    # .NET 8 and 9 are pre-installed on ubuntu-latest, so we only need to install .NET 10.
    - name: Setup .NET SDK 10
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '10.0.x'

    - name: Install dependencies
      run: dotnet restore --locked-mode

    - name: Build
      run: dotnet build --configuration Release --no-restore
  
  test:
    needs: [build]
    runs-on: ubuntu-latest
    name: Run all tests

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false
      
    # The NuGet package we're building supports .NET 8, .NET 9, and .NET 10.
    # .NET 8 and 9 are pre-installed on ubuntu-latest, so we only need to install .NET 10.
    - name: Setup .NET SDK 10
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '10.0.x'

    - name: Run all tests
      run: dotnet test OwaspHeaders.Core.sln --verbosity minimal --filter "Category!=Performance"


  package:
    needs: [build, test]
    runs-on: ubuntu-latest
    name: Create and upload NuGet package
    environment: production
    permissions:
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0
        persist-credentials: false
      
    # The NuGet package we're building supports .NET 8, .NET 9, and .NET 10.
    # .NET 8 and 9 are pre-installed on ubuntu-latest, so we only need to install .NET 10.
    - name: Setup .NET SDK 10
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: '10.0.x'

    - name: Build NuGet package
      run: dotnet pack src/OwaspHeaders.Core.csproj --configuration Release

    - name: Generate Attestations
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: ${{ github.workspace }}/**/*.nupkg

    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push NuGet package
      # use of --skip-duplicate here will stop NuGet from complaining
      # if we try to publish the same version multiple times by making
      # publish actions idempotent.
      run: dotnet nuget push **/*.nupkg --source 'https://api.nuget.org/v3/index.json' --api-key "${STEPS_NUGET_LOGIN_OUTPUTS_NUGET_API_KEY}" --skip-duplicate
      env:
        STEPS_NUGET_LOGIN_OUTPUTS_NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
